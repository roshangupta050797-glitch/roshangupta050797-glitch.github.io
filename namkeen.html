<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - RN Kirana Wholesale</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f3f3;
    }

    .topbar {
      background: #0b7a3b;
      color: white;
      padding: 14px;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
      position: sticky;
      top: 0;
    }

    .back-link {
      display: inline-block;
      margin: 12px;
      text-decoration: none;
      color: #0b7a3b;
      font-weight: bold;
      background: white;
      padding: 10px 14px;
      border-radius: 10px;
    }

    .cart-container {
      padding: 12px;
    }

    .cart-item {
      background: white;
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .cart-item h3 {
      margin: 0 0 8px;
      font-size: 18px;
    }

    .cart-meta {
      color: #444;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .item-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .qty-btn,
    .remove-btn {
      border: none;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .qty-btn {
      background: #ffd814;
    }

    .remove-btn {
      background: #ff5252;
      color: white;
    }

    .summary-box {
      background: white;
      margin: 12px;
      padding: 16px;
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .summary-line {
      font-size: 16px;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .customer-form input,
    .customer-form textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      margin: 6px 0;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 15px;
    }

    .order-btn,
    .clear-btn {
      width: 100%;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    .order-btn {
      background: #25D366;
      color: white;
    }

    .clear-btn {
      background: #222;
      color: white;
    }

    .empty-cart {
      text-align: center;
      color: #555;
      padding: 40px 15px;
      font-size: 18px;
    }
  </style>
</head>
<body>

  <div class="topbar">RN Kirana Cart</div>

  <a href="index.html" class="back-link">← Home</a>

  <div class="cart-container" id="cartContainer"></div>

  <div class="summary-box">
    <div class="summary-line" id="totalItems">Total Items: 0</div>
    <div class="summary-line" id="totalAmount">Estimated Total: ₹0</div>

    <div class="customer-form">
      <input type="text" id="custName" placeholder="आपका नाम" required>
      <input type="tel" id="custPhone" placeholder="मोबाइल नंबर" required>
      <textarea id="custAddress" placeholder="पूरा पता / गांव / शहर" required></textarea>
    </div>

    <button class="order-btn" onclick="sendOrderToWhatsApp()">Order Now on WhatsApp</button>
    <button class="clear-btn" onclick="clearCart()">Clear Cart</button>
  </div>

  <script>
    function getCart() {
      return JSON.parse(localStorage.getItem("rn_cart")) || [];
    }

    function saveCart(cart) {
      localStorage.setItem("rn_cart", JSON.stringify(cart));
    }

    function renderCart() {
      const cartContainer = document.getElementById("cartContainer");
      const cart = getCart();

      if (cart.length === 0) {
        cartContainer.innerHTML = '<div class="empty-cart">Aapka cart abhi khaali hai 🛒</div>';
        document.getElementById("totalItems").innerText = "Total Items: 0";
        document.getElementById("totalAmount").innerText = "Estimated Total: ₹0";
        return;
      }

      let html = "";
      let totalItems = 0;
      let totalAmount = 0;

      cart.forEach((item, index) => {
        totalItems += item.qty;
        totalAmount += item.price * item.qty;

        html += `
          <div class="cart-item">
            <h3>${item.name}</h3>
            <div class="cart-meta">Price: ₹${item.price} | Qty: ${item.qty} | Total: ₹${item.price * item.qty}</div>
            <div class="item-actions">
              <button class="qty-btn" onclick="changeQty(${index}, 1)">+ Add One</button>
              <button class="qty-btn" onclick="changeQty(${index}, -1)">- Remove One</button>
              <button class="remove-btn" onclick="removeItem(${index})">Remove Item</button>
            </div>
          </div>
        `;
      });

      cartContainer.innerHTML = html;
      document.getElementById("totalItems").innerText = "Total Items: " + totalItems;
      document.getElementById("totalAmount").innerText = "Estimated Total: ₹" + totalAmount;
    }

    function changeQty(index, change) {
      let cart = getCart();
      cart[index].qty += change;

      if (cart[index].qty <= 0) {
        cart.splice(index, 1);
      }

      saveCart(cart);
      renderCart();
    }

    function removeItem(index) {
      let cart = getCart();
      cart.splice(index, 1);
      saveCart(cart);
      renderCart();
    }

    function clearCart() {
      localStorage.removeItem("rn_cart");
      renderCart();
    }

    function sendOrderToWhatsApp() {
      const name = document.getElementById("custName").value.trim();
      const phone = document.getElementById("custPhone").value.trim();
      const address = document.getElementById("custAddress").value.trim();
      const cart = getCart();

      if (!name || !phone || !address) {
        alert("कृपया नाम, मोबाइल नंबर और पता भरें");
        return;
      }

      if (cart.length === 0) {
        alert("Cart khaali hai");
        return;
      }

      let totalAmount = 0;

      let message = "नमस्ते 🙏%0A%0A";
      message += "मुझे ये सामान ऑर्डर करना है:%0A%0A";

      cart.forEach((item, i) => {
        totalAmount += item.price * item.qty;
        message += (i + 1) + ". " + item.name + " - ₹" + item.price + " x " + item.qty + " = ₹" + (item.price * item.qty) + "%0A";
      });

      message += "%0Aकुल आइटम: " + cart.reduce((sum, item) => sum + item.qty, 0);
      message += "%0Aअनुमानित कुल: ₹" + totalAmount;
      message += "%0A%0Aनाम: " + name;
      message += "%0Aमोबाइल: " + phone;
      message += "%0Aपता: " + address;
      message += "%0A%0Aकृपया ऑर्डर कन्फर्म करें।";

      window.open("https://wa.me/918574788904?text=" + message, "_blank");
    }

    renderCart();
  </script>

</body>
</html>
