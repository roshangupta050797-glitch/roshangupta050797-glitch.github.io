<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Namkeen - RN Kirana</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f3f3f3;
}

.topbar {
  background: #0b7a3b;
  color: white;
  padding: 12px;
  display: flex;
  justify-content: space-between;
}

.search-box input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
}

.product-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 10px;
}

.product {
  background: white;
  padding: 10px;
  border-radius: 10px;
}

.product img {
  width: 100%;
  height: 130px;
  object-fit: cover;
}

.cart-btn {
  background: #ffd814;
  border: none;
  padding: 8px;
  width: 100%;
  border-radius: 8px;
}

.qty-box {
  display: flex;
  gap: 5px;
  align-items: center;
}

.qty-btn {
  width: 30px;
  height: 30px;
  border: none;
  background: #ffd814;
}

.qty-input {
  width: 40px;
  text-align: center;
}
</style>
</head>

<body>

<div class="topbar">
  <a href="index.html">← Back</a>
  <b>RN Kirana</b>
  <a href="cart.html">Cart 🛒</a>
</div>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="Search namkeen...">
</div>

<div class="product-grid">

  <!-- PRODUCT 1 -->
  <div class="product" data-name="Amar Boondi Namkeen">
    <img src="offer1.jpg">
    <h4>Amar Boondi</h4>
    <p>₹132</p>

    <div id="qty-Amar Boondi Namkeen">
      <button class="cart-btn" onclick="firstAdd('Amar Boondi Namkeen',132)">Add to Cart</button>
    </div>
  </div>

  <!-- PRODUCT 2 -->
  <div class="product" data-name="Sev Bhujia">
    <img src="offer2.jpg">
    <h4>Sev Bhujia</h4>
    <p>₹110</p>

    <div id="qty-Sev Bhujia">
      <button class="cart-btn" onclick="firstAdd('Sev Bhujia',110)">Add to Cart</button>
    </div>
  </div>

</div>

<script>

// Add to cart
function addToCart(name, price) {
  let cart = JSON.parse(localStorage.getItem("rn_cart")) || [];

  let item = cart.find(i => i.name === name);

  if (item) {
    item.qty++;
  } else {
    cart.push({ name, price, qty: 1 });
  }

  localStorage.setItem("rn_cart", JSON.stringify(cart));

  alert("✅ " + name + " has been successfully added to your cart.\n\nYou can manage it anytime from Cart 🛒");
}

// First click
function firstAdd(name, price) {
  addToCart(name, price);

  let box = document.getElementById("qty-" + name);

  box.innerHTML = `
    <div class="qty-box">
      <button class="qty-btn" onclick="changeQty('${name}', -1)">-</button>
      <input type="number" value="1" class="qty-input"
      onchange="setQty('${name}', this.value)">
      <button class="qty-btn" onclick="changeQty('${name}', 1)">+</button>
    </div>
  `;
}

// Change qty
function changeQty(name, change) {
  let cart = JSON.parse(localStorage.getItem("rn_cart")) || [];
  let item = cart.find(i => i.name === name);

  if (!item) return;

  item.qty += change;

  if (item.qty <= 0) {
    cart = cart.filter(i => i.name !== name);

    document.getElementById("qty-" + name).innerHTML =
      `<button class="cart-btn" onclick="firstAdd('${name}', ${item.price})">Add to Cart</button>`;
  } else {
    document.querySelector(`#qty-${name} input`).value = item.qty;
  }

  localStorage.setItem("rn_cart", JSON.stringify(cart));
}

// Set qty
function setQty(name, value) {
  let cart = JSON.parse(localStorage.getItem("rn_cart")) || [];
  let item = cart.find(i => i.name === name);

  if (!item) return;

  item.qty = parseInt(value);

  if (item.qty <= 0) {
    cart = cart.filter(i => i.name !== name);

    document.getElementById("qty-" + name).innerHTML =
      `<button class="cart-btn" onclick="firstAdd('${name}', ${item.price})">Add to Cart</button>`;
  }

  localStorage.setItem("rn_cart", JSON.stringify(cart));
}

// Search
document.getElementById("searchInput").addEventListener("keyup", function() {
  let value = this.value.toLowerCase();
  document.querySelectorAll(".product").forEach(p => {
    let name = p.getAttribute("data-name").toLowerCase();
    p.style.display = name.includes(value) ? "block" : "none";
  });
});

</script>

</body>
</html>
