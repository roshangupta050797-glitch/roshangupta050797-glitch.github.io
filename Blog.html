<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog - Ramayan Kirana Wholesale</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
  color: #222;
}

.header {
  background: #0b7a3b;
  color: white;
  padding: 14px;
  text-align: center;
}

.header h1 {
  margin: 0;
  font-size: 22px;
}

.header p {
  margin: 6px 0 0;
  font-size: 13px;
}

.container {
  max-width: 900px;
  margin: 10px auto;
  padding: 10px;
}

.blog-card {
  background: white;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

.blog-date {
  font-size: 12px;
  color: #777;
  margin-bottom: 5px;
}

.blog-card h3 {
  margin: 0 0 6px;
  font-size: 16px;
  color: #0b7a3b;
}

.blog-card p {
  margin: 0 0 8px;
  font-size: 13px;
  line-height: 1.45;
  color: #333;
}

.read-btn {
  display: inline-block;
  font-size: 13px;
  padding: 6px 10px;
  background: #0b7a3b;
  color: white;
  border-radius: 6px;
  text-decoration: none;
}

.footer {
  text-align: center;
  padding: 12px;
  font-size: 13px;
}

.footer a {
  color: #0b7a3b;
  text-decoration: none;
  margin: 0 5px;
}
</style>
</head>
<body>

<div class="header">
  <h1>📚 रामायण किराना ब्लॉग</h1>
  <p>दैनिक किराना जानकारी, ऑफर और उपयोगी लेख</p>
</div>

<div class="container" id="blogList"></div>

<div class="footer">
  <a href="index.html">Home</a> |
  <a href="about.html">About</a> |
  <a href="contact.html">Contact</a> |
  <a href="privacy.html">Privacy Policy</a> |
  <a href="terms.html">Terms & Conditions</a>
</div>

<script src="blog-data.js"></script>
<script>
  blogs.sort((a, b) => new Date(b.date) - new Date(a.date));

  const blogList = document.getElementById("blogList");

  blogs.forEach(blog => {
    const card = document.createElement("div");
    card.className = "blog-card";

    const showDate = new Date(blog.date).toLocaleDateString("en-GB", {
      day: "numeric",
      month: "long",
      year: "numeric"
    });

    card.innerHTML = `
      <div class="blog-date">📅 ${showDate}</div>
      <h3>${blog.title}</h3>
      <p>${blog.desc}</p>
      <a class="read-btn" href="${blog.link}">पूरा पढ़ें</a>
    `;

    blogList.appendChild(card);
  });
</script>

</body>
</html>
